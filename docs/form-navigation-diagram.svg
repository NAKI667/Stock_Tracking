<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500">
  <style>
    .title { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    .box-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    .box-text { font: 14px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    .line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/>
    </marker>
  </defs>

  <rect x="20" y="20" width="1060" height="460" rx="20" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="550" y="60" text-anchor="middle" class="title">Form Navigation Diagram</text>

  <rect x="420" y="100" width="260" height="100" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="550" y="138" text-anchor="middle" class="box-title">DashboardForm</text>
  <text x="550" y="165" text-anchor="middle" class="box-text">Main entry screen</text>
  <text x="550" y="186" text-anchor="middle" class="box-text">Opens all active forms</text>

  <rect x="100" y="300" width="240" height="110" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="220" y="338" text-anchor="middle" class="box-title">CustomerForm</text>
  <text x="220" y="365" text-anchor="middle" class="box-text">Create and list customers</text>
  <text x="220" y="386" text-anchor="middle" class="box-text">Used before service request</text>

  <rect x="430" y="300" width="240" height="110" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="550" y="338" text-anchor="middle" class="box-title">ServiceRequestForm</text>
  <text x="550" y="365" text-anchor="middle" class="box-text">Create request</text>
  <text x="550" y="386" text-anchor="middle" class="box-text">Update status and assign parts</text>

  <rect x="760" y="300" width="240" height="110" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="880" y="338" text-anchor="middle" class="box-title">SparePartForm</text>
  <text x="880" y="365" text-anchor="middle" class="box-text">Add or refill spare parts</text>
  <text x="880" y="386" text-anchor="middle" class="box-text">Supports technical service flow</text>

  <path d="M470 200 C430 240, 320 250, 240 300" class="line"/>
  <path d="M550 200 L550 300" class="line"/>
  <path d="M630 200 C690 240, 790 250, 860 300" class="line"/>
</svg>
