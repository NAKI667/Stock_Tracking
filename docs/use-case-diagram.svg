<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <style>
    .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    .label { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
    .small { font: 15px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    .actor { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
    .oval { fill: #ffffff; stroke: #2563eb; stroke-width: 2.5; }
    .box { fill: #f8fbff; stroke: #94a3b8; stroke-width: 2; }
    .line { stroke: #64748b; stroke-width: 2; }
  </style>

  <rect x="20" y="20" width="1160" height="720" rx="20" fill="#f8fafc" stroke="#cbd5e1" />
  <text x="600" y="60" text-anchor="middle" class="title">Use Case Diagram - Technical Service Management</text>

  <rect x="250" y="100" width="700" height="580" rx="18" class="box" />
  <text x="600" y="130" text-anchor="middle" class="label">System Boundary</text>

  <g transform="translate(80,180)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#0f172a" stroke-width="2"/>
    <line x1="0" y1="18" x2="0" y2="70" class="line"/>
    <line x1="-32" y1="36" x2="32" y2="36" class="line"/>
    <line x1="0" y1="70" x2="-28" y2="110" class="line"/>
    <line x1="0" y1="70" x2="28" y2="110" class="line"/>
    <text x="0" y="145" text-anchor="middle" class="actor">Reception Staff</text>
  </g>

  <g transform="translate(80,420)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#0f172a" stroke-width="2"/>
    <line x1="0" y1="18" x2="0" y2="70" class="line"/>
    <line x1="-32" y1="36" x2="32" y2="36" class="line"/>
    <line x1="0" y1="70" x2="-28" y2="110" class="line"/>
    <line x1="0" y1="70" x2="28" y2="110" class="line"/>
    <text x="0" y="145" text-anchor="middle" class="actor">Technician</text>
  </g>

  <g transform="translate(1080,300)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#0f172a" stroke-width="2"/>
    <line x1="0" y1="18" x2="0" y2="70" class="line"/>
    <line x1="-32" y1="36" x2="32" y2="36" class="line"/>
    <line x1="0" y1="70" x2="-28" y2="110" class="line"/>
    <line x1="0" y1="70" x2="28" y2="110" class="line"/>
    <text x="0" y="145" text-anchor="middle" class="actor">Manager</text>
  </g>

  <ellipse cx="430" cy="200" rx="135" ry="38" class="oval" />
  <text x="430" y="206" text-anchor="middle" class="label">Register Customer</text>

  <ellipse cx="430" cy="300" rx="150" ry="38" class="oval" />
  <text x="430" y="306" text-anchor="middle" class="label">Create Service Request</text>

  <ellipse cx="430" cy="400" rx="145" ry="38" class="oval" />
  <text x="430" y="406" text-anchor="middle" class="label">Update Request Status</text>

  <ellipse cx="760" cy="220" rx="150" ry="38" class="oval" />
  <text x="760" y="226" text-anchor="middle" class="label">Add Service Operation</text>

  <ellipse cx="760" cy="330" rx="140" ry="38" class="oval" />
  <text x="760" y="336" text-anchor="middle" class="label">Assign Spare Part</text>

  <ellipse cx="760" cy="450" rx="135" ry="38" class="oval" />
  <text x="760" y="456" text-anchor="middle" class="label">Track Stock Quantity</text>

  <ellipse cx="760" cy="570" rx="145" ry="38" class="oval" />
  <text x="760" y="576" text-anchor="middle" class="label">Review Dashboard</text>

  <line x1="110" y1="180" x2="295" y2="200" class="line" />
  <line x1="110" y1="200" x2="280" y2="300" class="line" />
  <line x1="110" y1="420" x2="285" y2="400" class="line" />
  <line x1="110" y1="430" x2="610" y2="220" class="line" />
  <line x1="110" y1="450" x2="620" y2="330" class="line" />
  <line x1="110" y1="470" x2="625" y2="450" class="line" />
  <line x1="1045" y1="315" x2="905" y2="570" class="line" />
  <line x1="1045" y1="290" x2="895" y2="450" class="line" />

  <text x="600" y="705" text-anchor="middle" class="small">
    The main project focus is technical service workflow management. Spare part tracking supports service operations.
  </text>
</svg>
